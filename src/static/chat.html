<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AesthEase Clinic — Chat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
.phone{width:375px;height:700px;background:#fff;border-radius:40px;box-shadow:0 20px 60px rgba(0,0,0,0.15);display:flex;flex-direction:column;overflow:hidden;border:8px solid #1a1a1a}
.header{background:#075e54;padding:16px;display:flex;align-items:center;gap:12px}
.avatar{width:40px;height:40px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;font-size:18px}
.header-info{flex:1}
.header-name{color:#fff;font-size:15px;font-weight:600}
.header-status{color:#b2dfdb;font-size:12px}
.messages{flex:1;overflow-y:auto;padding:12px;background:#e5ddd5;display:flex;flex-direction:column;gap:8px}
.messages::-webkit-scrollbar{width:0}
.bubble-wrap{display:flex;flex-direction:column}
.bubble-wrap.user{align-items:flex-end}
.bubble-wrap.bot{align-items:flex-start}
.bubble{max-width:78%;padding:8px 12px;border-radius:8px;font-size:14px;line-height:1.5}
.bubble.user{background:#dcf8c6;border-radius:8px 0 8px 8px}
.bubble.bot{background:#fff;border-radius:0 8px 8px 8px}
.bubble-time{font-size:11px;color:#999;margin-top:2px;padding:0 4px}
.typing{display:none;align-items:center;gap:4px;background:#fff;padding:10px 14px;border-radius:0 8px 8px 8px;width:60px}
.typing.show{display:flex}
.dot{width:7px;height:7px;border-radius:50%;background:#999;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-row{background:#f0f0f0;padding:8px 12px;display:flex;gap:8px;align-items:center}
.input-row input{flex:1;border:none;border-radius:20px;padding:10px 16px;font-size:14px;outline:none;background:#fff}
.input-row button{width:40px;height:40px;border-radius:50%;background:#075e54;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.input-row button svg{fill:#fff;width:18px;height:18px}
.brand{text-align:center;padding:8px;font-size:11px;color:#aaa;background:#f0f2f5}

/* Login screen */
.login-screen{position:absolute;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px;border-radius:32px;z-index:10}
.login-logo{font-size:48px}
.login-title{font-size:20px;font-weight:700;color:#1a1a1a;text-align:center}
.login-sub{font-size:13px;color:#888;text-align:center}
.login-input{width:100%;padding:12px 16px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:15px;outline:none}
.login-input:focus{border-color:#075e54}
.login-btn{width:100%;padding:13px;background:#075e54;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer}
.login-btn:hover{background:#064e3b}
.login-note{font-size:11px;color:#bbb;text-align:center}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<div class="phone" style="position:relative">

  <!-- Login screen -->
  <div class="login-screen" id="login-screen">
    <div class="login-logo">🌸</div>
    <div class="login-title">AesthEase Clinic</div>
    <div class="login-sub">Enter your name to start chatting with our AI receptionist</div>
    <input class="login-input" id="login-name" placeholder="Your name" maxlength="30"
      onkeydown="if(event.key==='Enter')startChat()"/>
    <button class="login-btn" onclick="startChat()">Start Chat →</button>
    <div class="login-note">No account needed · Powered by AI</div>
  </div>

  <div class="header">
    <div class="avatar">🌸</div>
    <div class="header-info">
      <div class="header-name">AesthEase Clinic</div>
      <div class="header-status" id="header-status">Online</div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-row">
    <input id="input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendInput()" disabled/>
    <button onclick="sendInput()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<div class="brand">AesthEase Clinic AI Receptionist · Powered by LangGraph + RAG</div>
</div>

<script>
const API = window.location.origin;
let SESSION = '';
let msgCount = 0;

function getTime(){
  return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function addBubble(text, role){
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap ' + role;
  wrap.innerHTML = `<div class="bubble ${role}">${text}</div><div class="bubble-time">${getTime()}</div>`;
  document.getElementById('messages').appendChild(wrap);
  document.getElementById('messages').scrollTop = 99999;
}

function showTyping(){
  const t = document.createElement('div');
  t.className = 'typing show';
  t.id = 'typing';
  t.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  document.getElementById('messages').appendChild(t);
  document.getElementById('messages').scrollTop = 99999;
}

function hideTyping(){
  const t = document.getElementById('typing');
  if(t) t.remove();
}

function startChat(){
  const name = document.getElementById('login-name').value.trim();
  if(!name) return;

  // Session ID = name + random suffix (same name = different sessions unless same device)
  SESSION = "web_" + name.toLowerCase().replace(/\s+/g,"_") + "_" + Math.random().toString(36).slice(2,6);

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('input').disabled = false;
  document.getElementById("header-status").textContent = "Chatting as " + name;
  document.getElementById('input').focus();

  addBubble(`Hi ${name}! 👋 Welcome to AesthEase Clinic. How can I help you today?`, 'bot');
}

async function send(text){
  if(!text.trim() || !SESSION) return;
  document.getElementById('input').value = '';
  addBubble(text, 'user');
  showTyping();

  try {
    const msgId = SESSION + '_' + (++msgCount);
    await fetch(API + '/webhook/whatsapp', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        entry:[{changes:[{value:{messages:[{
          from: SESSION,
          id: msgId,
          type: 'text',
          text: {body: text}
        }]}}]}]
      })
    });

    await new Promise(r => setTimeout(r, 15000));

    const histRes = await fetch(API + '/admin/messages/' + encodeURIComponent(SESSION), {
      headers: {'x-admin-token': 'aesthease-admin-2026'}
    });
    const msgs = await histRes.json();
    hideTyping();

    const lastBot = [...msgs].reverse().find(m => m.role === 'assistant');
    if(lastBot) addBubble(lastBot.content, 'bot');
    else addBubble("Sorry, I didn't catch that. Could you rephrase?", 'bot');

  } catch(e) {
    hideTyping();
    addBubble('Connection error. Please try again.', 'bot');
  }
}

function sendInput(){
  send(document.getElementById('input').value);
}
</script>
</body>
</html>
